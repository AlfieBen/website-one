<!DOCTYPE html>
<html lang="en">

<head>
    
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Alfie Ben Levey</title>

<link rel="icon" type="image/png" href="favicon.png">
<link rel="icon" href="favicon.ico">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
    
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">


<style>

html,
body{

    width:100%;
    height:100%;
    margin:0;
    overflow:hidden;
    background:#050505;

}



body{

    position:relative;

    min-height:100vh;
    min-height:100dvh;

    display:flex;

    justify-content:center;

    align-items:center;


    background:

    radial-gradient(
    circle at center,
    #202020 0%,
    #121212 45%,
    #050505 100%
    );


    color:#f5f5f5;


    font-family:'Manrope', sans-serif;


    transition:color 1.2s ease;

}





.themeFade{

    position:absolute;

    inset:0;


    background:

    radial-gradient(
    circle at center,
    #eeeeee,
    #bbbbbb,
    #777777
    );


    opacity:0;


    transition:opacity 1.2s ease;


    pointer-events:none;


    z-index:0;

}



.light .themeFade{

    opacity:1;

}






.themeButton{


    position:absolute;


    top:25px;


    right:25px;


    z-index:5;



    width:45px;


    height:45px;



    border-radius:50%;



    border:1px solid rgba(255,255,255,.15);



    background:rgba(255,255,255,.06);



    color:white;



    cursor:pointer;



    backdrop-filter:blur(10px);



    font-size:20px;



    transition:.8s;

}



.themeButton:hover{

    transform:scale(1.1);

}







body::before{


    content:"";



    position:absolute;



    width:200vw;


    height:200vh;



    left:50%;



    top:50%;





    transform:translate(-50%,-50%);





    background:


    radial-gradient(

    circle,

    rgba(255,255,255,.035),

    transparent 70%

    );



    animation:greyMove 10s infinite alternate;

}





@keyframes greyMove{


from{

transform:translate(-40px,-30px);

}


to{

transform:translate(40px,30px);

}


}








body::after{


    content:"";



    position:absolute;



    width:200vw;


    height:200vh;



    top:50%;



    left:50%;





    background:


    radial-gradient(

    circle,

    rgba(45,90,255,.18),

    transparent 60%

    );




    filter:blur(65px);



    animation:ambientGlow 18s ease-in-out infinite;



    pointer-events:none;

}







.light::after{


background:


radial-gradient(

circle,

rgba(190,35,35,.07),

transparent 70%

);


filter:blur(75px);


}








@keyframes ambientGlow{


0%{

transform:translate(-58%,-52%) scale(.95);

opacity:.55;

}



25%{

transform:translate(-48%,-60%) scale(1.05);

opacity:.75;

}



50%{

transform:translate(-42%,-42%) scale(1.15);

opacity:.9;

}



75%{

transform:translate(-62%,-45%) scale(1.05);

opacity:.75;

}



100%{

transform:translate(-58%,-52%) scale(.95);

opacity:.55;

}


}








.card{


position:relative;


z-index:1;


text-align:center;




width:min(650px,80vw);



padding:90px 130px;





background:rgba(255,255,255,.045);





border:1px solid rgba(255,255,255,.12);





border-radius:35px;





backdrop-filter:blur(20px);





box-shadow:


inset 0 0 30px rgba(255,255,255,.02),


0 30px 100px rgba(0,0,0,.7);






transition:


transform .45s ease,


box-shadow 1.2s ease,


background 1.2s ease;


}








.card:hover{


transform:


translateY(-10px)


scale(1.03);





box-shadow:


inset 0 0 30px rgba(255,255,255,.01),


0 45px 130px rgba(0,0,0,.9);


}









.card::after{


content:"";

position:absolute;

inset:-2px;

border-radius:35px;




background:


linear-gradient(

120deg,

transparent 30%,

rgba(255,255,255,.08),

transparent 70%

);




background-size:200% 200%;



opacity:0;



transition:opacity .8s ease;



z-index:-1;



animation:shine 8s infinite;


}




.card:hover::after{

opacity:.7;

}





@keyframes shine{


0%{

background-position:-200% 0;

}



100%{

background-position:200% 0;

}


}








h1{


margin:0;



font-size:


clamp(2.2rem,6vw,4rem);





letter-spacing:3px;



font-weight:700;


}





p{


margin-top:45px;


color:#999;



font-size:


clamp(1.1rem,2vw,1.35rem);



font-weight:400;


}







.light{


color:#111;

}







.light .card{


background:

rgba(255,255,255,.28);




box-shadow:


inset 0 0 35px rgba(255,255,255,.15),


0 30px 100px rgba(0,0,0,.25);


}






.light p{

color:#555;

}






.light .themeButton{


color:#111;


background:

rgba(0,0,0,.08);

}








@media(max-width:600px){


.card{

width:82vw;


padding:45px 25px;


border-radius:28px;

}


p{

margin-top:30px;

}


}






</style>

</head>



<body>



<div class="themeFade"></div>



<button class="themeButton" onclick="toggleTheme()">☾</button>




<div class="card">


<h1>Alfie Ben Levey</h1>


<p>I'm better than you and you know it</p>


</div>





<script>


function toggleTheme(){


document.body.classList.toggle("light");



document.querySelector(".themeButton").textContent =



document.body.classList.contains("light")

? "☀"

: "☾";

}



</script>





</body>

</html>
