<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alfie Ben Levey</title>

<style>

html {

    min-height:100%;

    background:
    radial-gradient(
    circle at center,
    #202020 0%,
    #121212 45%,
    #050505 100%
    );

}



body {

    margin:0;

    min-height:100vh;
    min-height:100dvh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(
    circle at center,
    #202020 0%,
    #121212 45%,
    #050505 100%
    );

    color:#f5f5f5;

    font-family:Arial, Helvetica, sans-serif;

    overflow:hidden;

}



body::before {

    content:"";

    position:absolute;

    width:min(70vw,600px);
    height:min(70vw,600px);

    background:
    radial-gradient(
    circle,
    rgba(255,255,255,0.035),
    transparent 70%
    );

    animation:greyMove 10s infinite alternate;

}



@keyframes greyMove {

    from {

        transform:
        translate(-40px,-30px);

    }

    to {

        transform:
        translate(40px,30px);

    }

}



body::after {

    content:"";

    position:absolute;

    width:min(90vw,900px);
    height:min(90vw,900px);

    top:50%;
    left:50%;

    background:
    radial-gradient(
    circle,
    rgba(45,90,255,0.28),
    transparent 65%
    );

    filter:blur(45px);

    animation:
    blueMove 12s ease-in-out infinite;

    pointer-events:none;

}



@keyframes blueMove {

    0% {

        transform:
        translate(-60%,-50%)
        scale(0.9);

        opacity:0.6;

    }

    25% {

        transform:
        translate(-40%,-60%)
        scale(1.05);

        opacity:0.8;

    }

    50% {

        transform:
        translate(-45%,-35%)
        scale(1.15);

        opacity:1;

    }

    75% {

        transform:
        translate(-65%,-45%)
        scale(1.05);

        opacity:0.8;

    }

    100% {

        transform:
        translate(-60%,-50%)
        scale(0.9);

        opacity:0.6;

    }

}



.card {

    position:relative;

    z-index:1;

    text-align:center;

    width:min(650px,80vw);

    padding:90px 130px;

    background:
    rgba(255,255,255,0.045);

    border:
    1px solid rgba(255,255,255,0.12);

    border-radius:35px;

    backdrop-filter:blur(20px);

    box-shadow:

    inset 0 0 30px rgba(255,255,255,0.02),

    0 30px 100px rgba(0,0,0,0.7);

    transition:
    transform 0.35s ease,
    box-shadow 0.35s ease;

}



.card:hover {

    transform:
    translateY(-10px)
    scale(1.03);

    box-shadow:

    inset 0 0 30px rgba(255,255,255,0.01),

    0 45px 130px rgba(0,0,0,0.9);

}



.card::after {

    content:"";

    position:absolute;

    inset:-2px;

    border-radius:35px;

    background:
    linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.05),
    transparent
    );

    opacity:0;

    transition:0.35s;

    z-index:-1;

}



.card:hover::after {

    opacity:1;

}



h1 {

    margin:0;

    font-size:clamp(2.2rem,6vw,4rem);

    letter-spacing:clamp(2px,0.4vw,6px);

    font-weight:500;

    text-shadow:
    0 0 25px rgba(255,255,255,0.06);

}



p {

    margin-top:45px;

    color:#888;

    font-size:clamp(1.1rem,2vw,1.35rem);

}



@media (max-width:600px) {

    .card {

        width:82vw;

        padding:
        45px
        25px;

        border-radius:28px;

    }

    p {

        margin-top:30px;

    }

}

</style>

</head>

<body>

<div class="card">

<h1>Alfie Ben Levey</h1>

<p>I'm better than you and you know it</p>

</div>

</body>

</html>
