<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Alfie Ben Levey</title>


<style>


html,body{

width:100%;
height:100%;

margin:0;

overflow:hidden;

}



body{

min-height:100vh;
min-height:100dvh;

display:flex;

justify-content:center;

align-items:center;


font-family:Arial,Helvetica,sans-serif;

color:white;


background:

radial-gradient(circle,#202020,#121212,#050505);

transition:.5s;

}



.themeButton{

position:absolute;

top:25px;

right:25px;

z-index:999;

width:45px;

height:45px;

border-radius:50%;

border:1px solid rgba(255,255,255,.2);

background:rgba(255,255,255,.1);

color:white;

font-size:20px;

cursor:pointer;

backdrop-filter:blur(10px);

}



.card{

position:relative;

z-index:5;

text-align:center;


width:min(650px,82vw);


padding:80px 60px;


background:rgba(255,255,255,.06);


border:1px solid rgba(255,255,255,.15);


border-radius:35px;


backdrop-filter:blur(20px);


box-shadow:

0 30px 100px rgba(0,0,0,.7);


transition:.35s;

}



.card:hover{

transform:

translateY(-10px)

scale(1.03);


box-shadow:

0 45px 130px rgba(0,0,0,.9);

}




h1{

margin:0;

font-size:clamp(2.2rem,6vw,4rem);

letter-spacing:5px;

}



p{

margin-top:40px;

color:rgba(255,255,255,.75);

}



.hidden{

display:none;

}





#list{

max-height:45vh;

overflow-y:auto;

}



.achievement{

text-align:left;

margin:15px 0;

padding:15px;

border-radius:18px;

background:rgba(255,255,255,.08);

}



.locked{

opacity:.45;

}



.reset{

margin-top:20px;

padding:10px 20px;

border-radius:20px;

border:none;

cursor:pointer;

}




.light{

background:

radial-gradient(circle,#eee,#bbb,#777);

color:#111;

}



.light .card{

background:rgba(255,255,255,.45);

}



.light p{

color:#222;

}



.light .themeButton{

color:#111;

}



.secret{

color:white;

}



.secret .card{

background:rgba(0,0,0,.35);

}



.secret p{

color:white;

}





</style>

</head>


<body>



<button class="themeButton" onclick="toggleTheme()">☀</button>




<div class="card" id="main">


<h1>Alfie Ben Levey</h1>


<p>I'm better than you and you know it</p>


</div>






<div class="card hidden" id="achievements">


<h1>Achievements</h1>


<div id="list"></div>


<button class="reset" onclick="resetAsk()">

Reset

</button>


<br><br>


<button onclick="closeAchievements()">

Back

</button>


</div>







<script>


let data =
JSON.parse(localStorage.getItem("achievements")) || {};



let cardClicks=0;

let opens=0;

let clicks=[];

let secretActive=false;

let start=Date.now();

let normalBackground=

"radial-gradient(circle,#202020,#121212,#050505)";







const achievements={


welcome:[
"Welcome",
"Something happens when you arrive...",
"You opened the site."
],


explorer:[
"Explorer",
"The card may hide something...",
"You found achievements."
],


colour:[
"Colour Hunter",
"Try pressing something a lot...",
"You found the secret themes."
],


night:[
"Night Mode",
"Try the button...",
"You changed the theme."
],


early:[
"Early Visitor",
"Time matters...",
"You visited before 06:00."
],


professional:[
"Professional",
"Wait around...",
"You stayed for a while."
],


collector:[
"Collector",
"Find more secrets...",
"You collected achievements."
],


triopen:[
"Triopen",
"Three times is special...",
"You opened achievements 3 times."
],


restart:[
"Restarting",
"Starting again...",
"You reset achievements."
],


completion:[
"Completionist",
"Hidden",
"You found everything."
]


};






function save(){

localStorage.setItem(

"achievements",

JSON.stringify(data)

);

}





function unlock(x){

if(!data[x]){

data[x]=true;

save();

}

}







function render(){


let html="";


let count=

Object.keys(achievements)

.filter(x=>x!="completion")

.filter(x=>data[x]).length;



Object.keys(achievements).forEach(id=>{


if(id=="completion" && count<9)return;



let a=achievements[id];



html+=`

<div class="achievement ${data[id]?"":"locked"}">


<h3>${data[id]?"🏆":"🔒"} ${a[0]}</h3>


<p>${data[id]?a[2]:a[1]}</p>


</div>

`;

});


document.getElementById("list").innerHTML=html;


}








document.getElementById("main").onclick=function(){


cardClicks++;


if(cardClicks>=3){


unlock("explorer");


opens++;


if(opens>=3)

unlock("triopen");



document.getElementById("main").classList.add("hidden");


document.getElementById("achievements").classList.remove("hidden");


render();


}


};






function closeAchievements(){

document.getElementById("achievements").classList.add("hidden");

document.getElementById("main").classList.remove("hidden");

}








function toggleTheme(){



if(secretActive){


document.body.classList.remove("secret");


document.body.style.background=

normalBackground;


secretActive=false;


return;


}



clicks.push(Date.now());


clicks=

clicks.filter(x=>Date.now()-x<5000);




if(clicks.length>=5){


secretTheme();


secretActive=true;


clicks=[];


return;


}



document.body.classList.toggle("light");


unlock("night");


}








function secretTheme(){



let themes=[


["#ff7eb3","#65d6ff"],

["#9b5cff","#00ffcc"],

["#ff9966","#ff5e62"],

["#00c6ff","#0072ff"],

["#43e97b","#38f9d7"],

["#f7971e","#ffd200"],

["#ee0979","#ff6a00"],

["#654ea3","#eaafc8"],

["#141e30","#243b55"],

["#000428","#004e92"]


];



let d=new Date();


let seed=

d.getFullYear()

+d.getMonth()

+d.getDate();



let theme=

themes[seed % themes.length];



document.body.style.background=

`radial-gradient(circle,${theme[0]},${theme[1]})`;



document.body.classList.add("secret");


unlock("colour");

}







function resetAsk(){


if(confirm("Are you sure?")){


let hadRestart=data.restart;


data={};



if(!hadRestart)

data.restart=true;



save();


render();


}

}






if(Object.keys(data).length===0)

unlock("welcome");




if(new Date().getHours()<6)

unlock("early");





setInterval(()=>{


if(Date.now()-start>60000)

unlock("professional");


},1000);



</script>


</body>

</html>
