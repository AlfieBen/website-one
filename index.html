<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Alfie Ben Levey</title>

<style>

html,body{
width:100%;
height:100%;
margin:0;
overflow:hidden;
background:#050505;
}


body{

min-height:100vh;
min-height:100dvh;

display:flex;
justify-content:center;
align-items:center;

font-family:Arial, Helvetica, sans-serif;

color:#f5f5f5;

background:
radial-gradient(circle at center,#202020,#121212,#050505);

transition:.5s;

}





.themeButton{

position:absolute;

top:25px;

right:25px;

z-index:9999;

width:45px;

height:45px;

border-radius:50%;

border:1px solid rgba(255,255,255,.15);

background:rgba(255,255,255,.08);

color:white;

cursor:pointer;

backdrop-filter:blur(10px);

font-size:20px;

}





body::before{

content:"";

position:absolute;

z-index:0;

width:200vw;

height:200vh;

background:

radial-gradient(circle,

rgba(255,255,255,.035),

transparent 70%);

animation:greyMove 10s infinite alternate;

}



@keyframes greyMove{

from{
transform:translate(-40px,-30px);
}

to{
transform:translate(40px,30px);
}

}





body::after{

content:"";

position:absolute;

z-index:0;

width:160vw;

height:160vh;

top:50%;

left:50%;


transform:translate(-50%,-50%);


background:

radial-gradient(circle,

rgba(45,90,255,.28),

transparent 65%);


filter:blur(45px);


animation:blueMove 12s infinite ease-in-out;

}



@keyframes blueMove{


0%{

transform:
translate(-50%,-50%)
scale(.9);

}


50%{

transform:
translate(-45%,-45%)
scale(1.15);

}


100%{

transform:
translate(-50%,-50%)
scale(.9);

}

}







.card{

position:relative;

z-index:2;

text-align:center;

width:min(650px,80vw);

padding:80px 60px;


background:rgba(255,255,255,.045);


border:1px solid rgba(255,255,255,.12);


border-radius:35px;


backdrop-filter:blur(20px);



box-shadow:

inset 0 0 30px rgba(255,255,255,.02),

0 30px 100px rgba(0,0,0,.7);



transition:

transform .35s ease,

box-shadow .35s ease;

}



.card:hover{

transform:

translateY(-10px)

scale(1.03);



box-shadow:

0 45px 130px rgba(0,0,0,.9);

}






h1{

margin:0;

font-size:clamp(2.2rem,6vw,4rem);

letter-spacing:5px;

font-weight:500;

}





p{

margin-top:40px;

color:#888;

}






.achievement{

text-align:left;

margin:15px 0;

padding:15px;

border-radius:18px;

background:rgba(255,255,255,.06);

}



.locked{

opacity:.45;

}





#list{

max-height:45vh;

overflow-y:auto;

padding-right:8px;

}



#list::-webkit-scrollbar{

width:6px;

}



#list::-webkit-scrollbar-thumb{

background:rgba(255,255,255,.25);

border-radius:10px;

}





.reset{

margin-top:20px;

padding:10px 20px;

border-radius:20px;

border:none;

cursor:pointer;

}





.hidden{

display:none;

}






.light {

background:

radial-gradient(

circle at center,

#eeeeee,

#bbbbbb,

#777777

);

color:#111;

}



.light .card{

background:

rgba(255,255,255,.35);

border-color:

rgba(0,0,0,.15);

}



.light p{

color:#333;

}



.light .themeButton{

color:#111;

background:

rgba(0,0,0,.08);

}





@media(max-width:600px){

.card{

width:82vw;

padding:45px 25px;

border-radius:28px;

}

}



</style>

</head>



<body>


<button class="themeButton" onclick="toggleTheme()">☀</button>





<div class="card" id="main">

<h1>Alfie Ben Levey</h1>

<p>I'm better than you and you know it</p>

</div>







<div class="card hidden" id="achievements">


<h1>Achievements</h1>


<div id="list"></div>


<button class="reset" onclick="resetAsk()">

Reset Achievements

</button>


<br><br>


<button onclick="closeAchievements()">

Back

</button>


</div>








<script>


let data =
JSON.parse(localStorage.getItem("achievements")) || {};


let cardClicks=0;

let achOpen=0;

let startTime=Date.now();






const achievements={


welcome:{
name:"Welcome",
hint:"Something happens when you arrive...",
text:"You arrived. That was the first step."
},


explorer:{
name:"Explorer",
hint:"Maybe the card has more than one purpose...",
text:"You looked around instead of leaving."
},


colour:{
name:"Colour Hunter",
hint:"Some things appear when you click enough...",
text:"You found the hidden colours."
},


night:{
name:"Night Mode",
hint:"There are two sides to this page...",
text:"You saw both sides."
},


early:{
name:"Early Visitor",
hint:"The time you visit might matter...",
text:"You found the website before most people wake up."
},


professional:{
name:"Professional",
hint:"Try doing nothing...",
text:"You stayed longer than expected."
},


collector:{
name:"Collector",
hint:"There are more secrets hidden here...",
text:"You started collecting."
},


triopen:{
name:"Triopen",
hint:"Maybe opening it once isn't enough...",
text:"You kept checking."
},


restart:{
name:"Restarting",
hint:"Sometimes starting again reveals something...",
text:"You erased everything. Then found this."
},


completion:{
name:"Completionist",
hint:"Hidden",
text:"You found everything hidden on this page."
}

};






function save(){

localStorage.setItem(
"achievements",
JSON.stringify(data)
);

}





function unlock(id){

if(!data[id]){

data[id]=true;

save();

}

}







function render(){


let html="";


let count=

Object.keys(achievements)

.filter(x=>x!="completion")

.filter(x=>data[x]).length;



Object.keys(achievements).forEach(id=>{


if(id=="completion" && count<9)return;



html+=`

<div class="achievement ${data[id]?"":"locked"}">

<h3>

${data[id]?"🏆":"🔒"}

${achievements[id].name}

</h3>


<p>

${data[id]?

achievements[id].text:

achievements[id].hint}

</p>


</div>

`;

});


document.getElementById("list").innerHTML=html;


}






document.getElementById("main").onclick=function(){


cardClicks++;


if(cardClicks>=3){

openAchievements();

}

};







function openAchievements(){


unlock("explorer");


achOpen++;


if(achOpen>=3){

unlock("triopen");

}



document.getElementById("main").classList.add("hidden");


document.getElementById("achievements").classList.remove("hidden");


render();

}






function closeAchievements(){


document.getElementById("achievements").classList.add("hidden");


document.getElementById("main").classList.remove("hidden");

}






function toggleTheme(){


document.body.classList.toggle("light");


if(document.body.classList.contains("light")){

document.querySelector(".themeButton").textContent="🌙";

}

else{

document.querySelector(".themeButton").textContent="☀";

}


unlock("night");


}






function resetAsk(){


if(confirm("Are you sure? This will remove all saved achievements.")){


let old=data.restart;


data={};


if(!old){

data.restart=true;

}


save();

render();


}

}






if(Object.keys(data).length==0){

unlock("welcome");

}





if(new Date().getHours()<6){

unlock("early");

}





setInterval(()=>{


if(Date.now()-startTime>60000){

unlock("professional");

}


},1000);



</script>


</body>

</html>
